openapi: 3.1.1
info:
  title: Coupons API
  version: 1.0.0
  summary: Coupons API
  description: |
    Coupons API
  contact:
    name: Coupons API Support
    url: https://www.loyaltyengine.org/support
    email: support@loyaltyengine.org
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: https://api.loyaltyengine.org
    description: Live server
paths:
  /coupons/v1/properties/{propertyId}/coupons:
    get:
      summary: List all property coupons
      description: |
        Retrieve all active coupons for a property
      operationId: listPropertyCoupons
      security:
        - bearerAuth: []
        - apiKey: []
      tags:
        - coupons
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/PropertyId.yaml'
        - name: pageSize
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PageSize'
        - name: pageNumber
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PageNumber'
        - name: status
          in: query
          required: false
          description: Filter coupons by status
          schema:
            $ref: '#/components/schemas/CouponStatus'
        - name: couponType
          in: query
          required: false
          description: Filter coupons by type
          schema:
            $ref: '#/components/schemas/CouponType'
        - name: sort
          in: query
          required: false
          description: Sort field and direction
          schema:
            type: string
            enum:
              - createdAt
              - expireAt
              - validFrom
              - '-createdAt'
              - '-expireAt'
              - '-validFrom'
            default: '-createdAt'
      responses:
        '200':
          $ref: '#/components/responses/ListCouponsResponse'
        '400':
          $ref: './shared/responses/BadRequest.yaml'
        '401':
          $ref: './shared/responses/Unauthorized.yaml'
        '403':
          $ref: './shared/responses/Forbidden.yaml'
        '404':
          $ref: './shared/responses/NotFound.yaml'
        '500':
          $ref: './shared/responses/InternalServerError.yaml'
  /coupons/v1/properties/{propertyId}/customers/{customerId}/coupons:
    get:
      summary: List specific customer coupons
      description: |
        Retrieve all active coupons for a specific customer
      operationId: listCustomerCoupons
      security:
        - bearerAuth: []
        - apiKey: []
      tags:
        - coupons
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/PropertyId.yaml'
        - name: customerId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/CustomerId.yaml'
        - name: pageSize
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PageSize'
        - name: pageNumber
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PageNumber'
        - name: status
          in: query
          required: false
          description: Filter coupons by status
          schema:
            $ref: '#/components/schemas/CouponStatus'
        - name: couponType
          in: query
          required: false
          description: Filter coupons by type
          schema:
            $ref: '#/components/schemas/CouponType'
        - name: sort
          in: query
          required: false
          description: Sort field and direction
          schema:
            type: string
            enum:
              - createdAt
              - expireAt
              - validFrom
              - '-createdAt'
              - '-expireAt'
              - '-validFrom'
            default: '-createdAt'
      responses:
        '200':
          $ref: '#/components/responses/ListCouponsResponse'
        '400':
          $ref: './shared/responses/BadRequest.yaml'
        '401':
          $ref: './shared/responses/Unauthorized.yaml'
        '403':
          $ref: './shared/responses/Forbidden.yaml'
        '404':
          $ref: './shared/responses/NotFound.yaml'
        '500':
          $ref: './shared/responses/InternalServerError.yaml'
    post:
      summary: Create coupon
      description: |
        Create a new coupon for a customer
      operationId: createCoupon
      security:
        - bearerAuth: []
        - apiKey: []
      tags:
        - coupons
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/PropertyId.yaml'
        - name: customerId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/CustomerId.yaml'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseCreateCouponRequest'
      responses:
        '201':
          $ref: '#/components/responses/CreateCouponResponse'
        '400':
          $ref: './shared/responses/BadRequest.yaml'
        '401':
          $ref: './shared/responses/Unauthorized.yaml'
        '403':
          $ref: './shared/responses/Forbidden.yaml'
        '500':
          $ref: './shared/responses/InternalServerError.yaml'
  /coupons/v1/properties/{propertyId}/customers/{customerId}/coupons/{couponCode}:
    get:
      summary: Get coupon details
      description: |
        Retrieve details of a specific coupon
      operationId: getCoupon
      security:
        - bearerAuth: []
        - apiKey: []
      tags:
        - coupons
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/PropertyId.yaml'
        - name: customerId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/CustomerId.yaml'
        - name: couponCode
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/CouponCode'
      responses:
        '200':
          description: Coupon details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponResponse'
        '400':
          $ref: './shared/responses/BadRequest.yaml'
        '401':
          $ref: './shared/responses/Unauthorized.yaml'
        '403':
          $ref: './shared/responses/Forbidden.yaml'
        '404':
          $ref: './shared/responses/NotFound.yaml'
        '500':
          $ref: './shared/responses/InternalServerError.yaml'
    delete:
      summary: Delete coupon
      description: |
        Delete a coupon (marks it as cancelled)
      operationId: deleteCoupon
      security:
        - bearerAuth: []
        - apiKey: []
      tags:
        - coupons
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/PropertyId.yaml'
        - name: customerId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/CustomerId.yaml'
        - name: couponCode
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/CouponCode'
      responses:
        '204':
          description: Coupon deleted successfully
        '400':
          $ref: './shared/responses/BadRequest.yaml'
        '401':
          $ref: './shared/responses/Unauthorized.yaml'
        '403':
          $ref: './shared/responses/Forbidden.yaml'
        '404':
          $ref: './shared/responses/NotFound.yaml'
        '500':
          $ref: './shared/responses/InternalServerError.yaml'
  /coupons/v1/properties/{propertyId}/customers/{customerId}/coupons/{couponCode}/redemptions:
    post:
      summary: Redeem coupon
      description: |
        Redeem a coupon for a customer
      operationId: redeemCoupon
      security:
        - bearerAuth: []
        - apiKey: []
      tags:
        - redemptions
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/PropertyId.yaml'
        - name: customerId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/CustomerId.yaml'
        - name: couponCode
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/CouponCode'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedemptionRequest'
      responses:
        '200':
          $ref: '#/components/responses/RedemptionResponse'
        '400':
          $ref: './shared/responses/BadRequest.yaml'
        '401':
          $ref: './shared/responses/Unauthorized.yaml'
        '403':
          $ref: './shared/responses/Forbidden.yaml'
        '404':
          $ref: './shared/responses/NotFound.yaml'
        '500':
          $ref: './shared/responses/InternalServerError.yaml'
    get:
      summary: Get coupon redemption details
      description: |
        Retrieve details of a specific coupon redemption
      operationId: getCouponRedemption
      security:
        - bearerAuth: []
        - apiKey: []
      tags:
        - redemptions
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/PropertyId.yaml'
        - name: customerId
          in: path
          required: true
          schema:
            $ref: './shared/schemas/CustomerId.yaml'
        - name: couponCode
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/CouponCode'
      responses:
        '200':
          $ref: '#/components/responses/RedemptionResponse'
        '400':
          $ref: './shared/responses/BadRequest.yaml'
        '401':
          $ref: './shared/responses/Unauthorized.yaml'
        '403':
          $ref: './shared/responses/Forbidden.yaml'
        '404':
          $ref: './shared/responses/NotFound.yaml'
        '500':
          $ref: './shared/responses/InternalServerError.yaml'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token authentication
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication
  responses:
    ListCouponsResponse:
      description: List of customer coupons
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CouponsResponse'
    CreateCouponResponse:
      description: Coupon created successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CouponResponse'
    GetCouponResponse:
      description: Coupon details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CouponResponse'
    RedemptionResponse:
      description: Coupon redeemed successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RedemptionResponse'

  schemas:
    BaseCreateCouponRequest:
      type: object
      discriminator:
        propertyName: couponType
        mapping:
          free_product: '#/components/schemas/CreateFreeProductCouponRequest'
          percentage: '#/components/schemas/CreatePercentageCouponRequest'
          fixed_amount: '#/components/schemas/CreateFixedAmountCouponRequest'
          free_shipping: '#/components/schemas/CreateFreeShippingCouponRequest'
      properties:
        couponType:
          $ref: '#/components/schemas/CouponType'
        campaignId:
          $ref: '#/components/schemas/CampaignId'
        description:
          $ref: '#/components/schemas/Description'
        usageLimit:
          $ref: '#/components/schemas/UsageLimit'
        isMultiUser:
          $ref: '#/components/schemas/IsMultiUser'
        eligible:
          $ref: '#/components/schemas/Eligible'
        expireAt:
          $ref: '#/components/schemas/ExpireAt'
        validFrom:
          $ref: '#/components/schemas/ValidFrom'
      required:
        - couponType
        - description

    CreateFreeProductCouponRequest:
      allOf:
        - $ref: '#/components/schemas/BaseCreateCouponRequest'
        - type: object
          properties:
            products:
              type: array
              items:
                $ref: '#/components/schemas/Product'
              minItems: 1
          required:
            - couponType
            - products

    CreatePercentageCouponRequest:
      allOf:
        - $ref: '#/components/schemas/BaseCreateCouponRequest'
        - type: object
          properties:
            percentage:
              $ref: '#/components/schemas/Percentage'
          required:
            - couponType
            - percentage

    CreateFixedAmountCouponRequest:
      allOf:
        - $ref: '#/components/schemas/BaseCreateCouponRequest'
        - type: object
          properties:
            amount:
              $ref: '#/components/schemas/Amount'
          required:
            - couponType
            - amount

    CreateFreeShippingCouponRequest:
      allOf:
        - $ref: '#/components/schemas/BaseCreateCouponRequest'
        - type: object

    CouponsResponse:
      allOf:
        - $ref: './shared/schemas/Response.yaml'
        - type: object
          properties:
            page:
              $ref: '#/components/schemas/Page'
            coupons:
              type: array
              items:
                $ref: '#/components/schemas/Coupon'

    CouponResponse:
      allOf:
        - $ref: './shared/schemas/Response.yaml'
        - type: object
          properties:
            coupon:
              $ref: '#/components/schemas/Coupon'

    RedemptionRequest:
      type: object
      properties:
        cart:
          $ref: '#/components/schemas/Cart'
    RedemptionResponse:
      allOf:
        - $ref: './shared/schemas/Response.yaml'
        - type: object
          properties:
            redemption:
              $ref: '#/components/schemas/Redemption'
    Redemption:
      type: object
      discriminator:
        propertyName: couponType
        mapping:
          fixed_amount: '#/components/schemas/FixedAmountRedemption'
          free_product: '#/components/schemas/FreeProductRedemption'
          free_shipping: '#/components/schemas/FreeShippingRedemption'
          percentage: '#/components/schemas/PercentageRedemption'
      properties:
        couponCode:
          $ref: '#/components/schemas/CouponCode'
        propertyId:
          $ref: './shared/schemas/PropertyId.yaml'
        ownedByCustomerId:
          $ref: './shared/schemas/CustomerId.yaml'
        redeemedByCustomerId:
          $ref: './shared/schemas/CustomerId.yaml'
        couponType:
          $ref: '#/components/schemas/CouponType'
        usage:
          $ref: '#/components/schemas/CouponUsage'
        redeemedAt:
          type: string
          format: date-time
          description: When the coupon was redeemed
      required:
        - couponCode
        - propertyId
        - ownedByCustomerId
        - redeemedByCustomerId
        - couponType
        - redeemedAt
    PercentageRedemption:
      allOf:
        - $ref: '#/components/schemas/Redemption'
        - type: object
          properties:
            percentage:
              $ref: '#/components/schemas/Percentage'
    FixedAmountRedemption:
      allOf:
        - $ref: '#/components/schemas/Redemption'
        - type: object
          properties:
            amount:
              $ref: '#/components/schemas/Amount'
    FreeProductRedemption:
      allOf:
        - $ref: '#/components/schemas/Redemption'
        - type: object
          properties:
            products:
              type: array
              items:
                $ref: '#/components/schemas/Product'
    FreeShippingRedemption:
      allOf:
        - $ref: '#/components/schemas/Redemption'
        - type: object
    Coupon:
      type: object
      discriminator:
        propertyName: couponType
        mapping:
          free_product: '#/components/schemas/FreeProductCoupon'
          percentage: '#/components/schemas/PercentageCoupon'
          fixed_amount: '#/components/schemas/FixedAmountCoupon'
          free_shipping: '#/components/schemas/FreeShippingCoupon'
      properties:
        couponCode:
          $ref: '#/components/schemas/CouponCode'
        propertyId:
          $ref: './shared/schemas/PropertyId.yaml'
        customerId:
          $ref: './shared/schemas/CustomerId.yaml'
        couponType:
          $ref: '#/components/schemas/CouponType'
        usage:
          $ref: '#/components/schemas/CouponUsage'
        description:
          $ref: '#/components/schemas/Description'
        isMultiUser:
          $ref: '#/components/schemas/IsMultiUser'
        eligible:
          $ref: '#/components/schemas/Eligible'
        expireAt:
          $ref: '#/components/schemas/ExpireAt'
        validFrom:
          $ref: '#/components/schemas/ValidFrom'
        createdAt:
          type: string
          format: date-time
          description: When the coupon was created
      required:
        - couponCode
        - propertyId
        - customerId
        - couponType
        - description
        - createdAt
        - status
    FixedAmountCoupon:
      allOf:
        - $ref: '#/components/schemas/Coupon'
        - type: object
          properties:
            amount:
              $ref: '#/components/schemas/Amount'
            applyToProductsIds:
              type: array
              items:
                 type: string
          required:
            - amount
    PercentageCoupon:
      allOf:
        - $ref: '#/components/schemas/Coupon'
        - type: object
          properties:
            percentage:
              $ref: '#/components/schemas/Percentage'
            applyToProductsIds:
              type: array
              items:
                 type: string
          required:
            - percentage
    FreeProductCoupon:
      allOf:
        - $ref: '#/components/schemas/Coupon'
        - type: object
          properties:
            products:
              type: array
              items:
                $ref: '#/components/schemas/Product'
    FreeShippingCoupon:
      allOf:
        - $ref: '#/components/schemas/Coupon'
        - type: object
    Eligible:
      type: object
      properties:
        productIds:
          type: array
          items:
            type: string
          example:
            - 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8d
            - 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8e
        categoryIds:
          type: array
          items:
            type: string
          example:
            - 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8d
            - 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8e
        minimumAmount:
          $ref: '#/components/schemas/Amount'
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    Cart:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        productIds:
          type: array
          items:
            type: string
          example:
            - 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8d
            - 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8e
        categoryIds:
          type: array
          items:
            type: string
          example:
            - 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8d
            - 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8e
        amount:
          $ref: '#/components/schemas/Amount'
    PageSize:
      type: integer
      minimum: 1
      maximum: 100
      default: 20
      example: 20
      description: |
        Maximum number of items to return.
    PageNumber:
      type: integer
      minimum: 1
      default: 1
      example: 1
      description: |
        Page number to retrieve. Starts from 1.
    Amount:
      type: object
      properties:
        value:
          type: number
          example: 10
          minimum: 0
          description: Amount value with up to 2 decimal places. Must be positive.
        currency:
          $ref: '#/components/schemas/Currency'
      required:
        - value
        - currency
    Product:
      type: object
      description: |
        Products can be goods or services.
      properties:
        productId:
          type: string
          example: 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8d
        quantity:
          type: integer
          minimum: 1
          default: 1
          example: 2
      required:
        - productId
    Percentage:
      type: integer
      minimum: 1
      maximum: 100
      example: 50
      description: |
        Coupon percentage. Value must be between 1 and 100.
    PropertyId:
      type: string
      description: |
        Unique property identifier. Properties represent websites, organizations, or applications using the loyalty program services.
      example: 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8d
    CustomerId:
      type: string
      description: |
        Unique customer identifier.
      example: 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8d
    CouponType:
      type: string
      enum:
        - free_shipping
        - free_product
        - percentage
        - fixed_amount
      description: |
        Coupon type: free_shipping, free_product, percentage, fixed_amount
      example: fixed_amount
    CouponStatus:
      type: string
      enum:
        - active
        - inactive
      description: |
        Coupon status
      example: active
    CouponCode:
      type: string
      example: E3B0C44298FC1C149A
      description: |
        Unique coupon code. Customers will use this code
        to redeem a coupon.
    RequestCode:
      type: string
      example: E3B0C44298FC1C149A
      description: |
        Unique coupon code. Customers will use this code
        to redeem a coupon. Autogenerated if not provided.
    Description:
      type: string
      description: |
        Coupon description.
    Currency:
      type: string
      description: |
        Coupon currency. ISO 4217 currency code.
      example: USD
    IsMultiUser:
      type: boolean
      default: false
      description: |
        If a coupon can be redeemed by any customer. By default only one customer can redeem a coupon.
      example: true
    UsageLimit:
      type: integer
      default: 1
      minimum: 1
      description: |
        The number of times a coupon can be used. By default coupon can be used only once.
      example: 3
    ExpireAt:
      type: string
      format: date-time
      description: |
        Coupon expiration date.
      example: '2025-09-30T15:30:00Z'
    ValidFrom:
      type: string
      format: date-time
      description: |
        Coupon start date.
      example: '2024-09-30T15:30:00Z'
    UsageBalance:
      type: integer
      description: |
        Remaining number of times a coupon can be used.
      example: 2
    CampaignId:
      type: string
      description: |
        Campaign identifier associated with the coupon. Used for marketing purposes.
      example: 5a3d8d0b-9f0b-4f6b-9c20-5a7d8c0b5c8d
    CouponUsage:
      type: object
      properties:
        limit:
          $ref: '#/components/schemas/UsageLimit'
        balance:
          $ref: '#/components/schemas/UsageBalance'
    Pagination:
      type: object
      properties:
        pageSize:
          type: integer
          example: 20
        pageNumber:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        hasMore:
          type: boolean
          example: true
      required:
        - pageSize
        - pageNumber
        - total
        - hasMore
        - totalPages

    ErrorType:
      type: string
      enum:
        - invalid_request
        - invalid_coupon
        - redemption_validation_error
        - unauthorized
        - forbidden
        - not_found
        - token_expired
        - invalid_token
        - token_not_found
        - validation_error
        - internal_server_error
        - conflict_error
    ErrorResponse:
      description: A standard error response
      allOf:
        - $ref: './shared/schemas/Response.yaml'
        - type: object
          properties:
            error:
              $ref: '#/components/schemas/ErrorType'
              description: The error type
            description:
              type: string
              description: A human-readable description of the error
            details:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'

          required:
            - error
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
          description: The field related to the error
        issue:
          type: string
          description: A description of the issue with the field
      required:
        - field
        - issue
    Page:
      type: object
      properties:
        page:
          type: integer
          example: 1
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 150
        totalPages:
          type: integer
          example: 150
        sort:
          type: string
          example: 'createdAt'
        order:
          type: string
          example: 'asc'
